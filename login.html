<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fourways Maths | Portal Login</title>
  <!-- Supabase JS CDN loaded in head -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --primary: #1E3A8A;
      --primary-hover: #1D4ED8;
      --bg: #F8FAFC;
      --card-bg: #FFFFFF;
      --text: #0F172A;
      --border: #E2E8F0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background-color: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
    
    .login-card { background: var(--card-bg); width: 100%; max-width: 420px; padding: 32px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid var(--border); }
    .brand-title { text-align: center; color: var(--primary); font-size: 1.6rem; font-weight: 700; margin-bottom: 8px; }
    .brand-subtitle { text-align: center; color: #64748B; font-size: 0.9rem; margin-bottom: 24px; }
    
    .tabs { display: flex; margin-bottom: 24px; border-bottom: 2px solid var(--border); }
    .tab-btn { flex: 1; padding: 10px; border: none; background: none; font-weight: 600; color: #64748B; cursor: pointer; transition: 0.2s; }
    .tab-btn.active { color: var(--primary); border-bottom: 2px solid var(--primary); margin-bottom: -2px; }

    form { display: flex; flex-direction: column; gap: 16px; }
    .input-group { display: flex; flex-direction: column; gap: 6px; }
    label { font-size: 0.85rem; font-weight: 600; color: #334155; }
    input, select { padding: 10px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.95rem; outline: none; }
    input:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.1); }

    .btn-submit { background-color: var(--primary); color: white; padding: 12px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; transition: 0.2s; }
    .btn-submit:hover { background-color: var(--primary-hover); }

    .message-box { padding: 10px; border-radius: 6px; font-size: 0.85rem; text-align: center; display: none; margin-bottom: 16px; }
    .message-box.error { background-color: #FEF2F2; color: #DC2626; border: 1px solid #FCA5A5; }
    .message-box.success { background-color: #F0FDF4; color: #166534; border: 1px solid #86EFAC; }
  </style>
</head>
<body>

  <div class="login-card">
    <h1 class="brand-title">Fourways Maths</h1>
    <p class="brand-subtitle">Learner & Parent Portal</p>

    <div class="tabs">
      <button type="button" class="tab-btn active" id="tab-login" onclick="toggleForm('login')">Sign In</button>
      <button type="button" class="tab-btn" id="tab-signup" onclick="toggleForm('signup')">Register</button>
    </div>

    <div id="msg" class="message-box"></div>

    <!-- LOGIN FORM -->
    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="input-group">
        <label for="login-email">Email Address</label>
        <input type="email" id="login-email" required placeholder="student@example.com">
      </div>
      <div class="input-group">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn-submit">Sign In</button>
    </form>

    <!-- SIGNUP FORM -->
    <form id="signup-form" style="display: none;" onsubmit="handleSignup(event)">
      <div class="input-group">
        <label for="signup-name">Full Name</label>
        <input type="text" id="signup-name" required placeholder="John Doe">
      </div>
      <div class="input-group">
        <label for="signup-grade">Grade</label>
        <select id="signup-grade" required>
          <option value="">Select Grade</option>
          <option value="Grade 8">Grade 8</option>
          <option value="Grade 9">Grade 9</option>
          <option value="Grade 10">Grade 10</option>
          <option value="Grade 11">Grade 11</option>
          <option value="Grade 12">Grade 12</option>
        </select>
      </div>
      <div class="input-group">
        <label for="signup-email">Email Address</label>
        <input type="email" id="signup-email" required placeholder="student@example.com">
      </div>
      <div class="input-group">
        <label for="signup-password">Password</label>
        <input type="password" id="signup-password" required minlength="6" placeholder="At least 6 characters">
      </div>
      <button type="submit" class="btn-submit">Create Account</button>
    </form>
  </div>

  <script>
    const SUPABASE_URL = "https://iajuctffwesmsumopoqu.supabase.co";
    const SUPABASE_KEY = "sb_publishable_ayM8pw97h1RpKpXcKEtnBA_TBRg2V-1";
    let supabase = null;

    window.addEventListener('DOMContentLoaded', () => {
      if (window.supabase) {
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      } else {
        showMsg("Could not load connection library. Please check your internet connection.", true);
      }
    });

    function showMsg(text, isError = false) {
      const msgBox = document.getElementById('msg');
      msgBox.textContent = text;
      msgBox.className = `message-box ${isError ? 'error' : 'success'}`;
      msgBox.style.display = 'block';
    }

    function toggleForm(type) {
      document.getElementById('msg').style.display = 'none';
      const loginForm = document.getElementById('login-form');
      const signupForm = document.getElementById('signup-form');
      const loginBtn = document.getElementById('tab-login');
      const signupBtn = document.getElementById('tab-signup');

      if (type === 'login') {
        loginForm.style.display = 'flex';
        signupForm.style.display = 'none';
        loginBtn.classList.add('active');
        signupBtn.classList.remove('active');
      } else {
        loginForm.style.display = 'none';
        signupForm.style.display = 'flex';
        signupBtn.classList.add('active');
        loginBtn.classList.remove('active');
      }
    }

    async function handleLogin(e) {
      e.preventDefault();
      if (!supabase) return showMsg("Supabase client not initialized.", true);

      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;

      showMsg("Signing in...", false);

      const { data, error } = await supabase.auth.signInWithPassword({ email, password });

      if (error) {
        showMsg(error.message, true);
      } else {
        showMsg("Login successful! Redirecting...", false);
        setTimeout(() => window.location.href = 'dashboard.html', 800);
      }
    }

    async function handleSignup(e) {
      e.preventDefault();
      if (!supabase) return showMsg("Supabase client not initialized.", true);

      const name = document.getElementById('signup-name').value;
      const grade = document.getElementById('signup-grade').value;
      const email = document.getElementById('signup-email').value;
      const password = document.getElementById('signup-password').value;

      showMsg("Creating account...", false);

      const { data: authData, error: authError } = await supabase.auth.signUp({ email, password });

      if (authError) {
        showMsg(authError.message, true);
        return;
      }

      if (authData.user) {
        const { error: dbError } = await supabase.from('students').insert([
          { user_id: authData.user.id, full_name: name, grade: grade }
        ]);

        if (dbError) {
          showMsg("Account created! " + dbError.message, true);
        } else {
          showMsg("Account created successfully! Redirecting...", false);
          setTimeout(() => window.location.href = 'dashboard.html', 1000);
        }
      }
    }
  </script>
</body>
</html>
