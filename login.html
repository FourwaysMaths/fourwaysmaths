<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fourways Maths | Student Registration</title>
  <!-- Supabase JS CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      /* Sleek Grey & Vibrant Yellow Color Theme */
      --primary-grey: #1E293B;      /* Deep Slate Grey */
      --secondary-grey: #334155;    /* Accent Slate Grey */
      --yellow-accent: #EAB308;    /* Vibrant Yellow/Gold */
      --yellow-hover: #CA8A04;     /* Darker Gold Hover */
      --bg: #F8FAFC;
      --card-bg: #FFFFFF;
      --text-main: #0F172A;
      --text-muted: #64748B;
      --border: #E2E8F0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { 
      background-color: var(--bg); 
      color: var(--text-main); 
      min-height: 100vh; 
      display: flex; 
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 28px 20px;
    }

    /* Container Box */
    .register-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-top: 6px solid var(--yellow-accent);
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 10px 25px rgba(30, 41, 59, 0.08);
      text-align: center;
    }

    /* Branding / Logo Area */
    .brand-logo-container {
      display: block;
      margin-bottom: 24px;
      text-decoration: none;
    }

    .brand-logo-img {
      height: 95px !important;
      max-height: none !important;
      width: auto;
      object-fit: contain;
      transition: transform 0.2s ease;
    }

    .brand-logo-img:hover {
      transform: scale(1.04);
    }

    .register-header h2 {
      color: var(--primary-grey);
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .register-header p {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 28px;
    }

    /* Form Inputs */
    .form-group {
      text-align: left;
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--primary-grey);
      margin-bottom: 6px;
    }

    .form-control {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
      background: #F8FAFC;
      transition: all 0.2s ease;
      outline: none;
    }

    .form-control:focus {
      background: #FFFFFF;
      border-color: var(--yellow-accent);
      box-shadow: 0 0 0 3px rgba(234, 179, 8, 0.2);
    }

    /* Buttons */
    .btn-primary {
      width: 100%;
      background-color: var(--yellow-accent);
      color: var(--primary-grey);
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background-color 0.2s ease;
      margin-top: 10px;
    }

    .btn-primary:hover {
      background-color: var(--yellow-hover);
    }

    /* Feedback Alerts */
    .alert {
      padding: 12px;
      border-radius: 6px;
      font-size: 0.85rem;
      margin-bottom: 18px;
      display: none;
      text-align: left;
    }

    .alert-error {
      background-color: #FEF2F2;
      color: #DC2626;
      border: 1px solid #FCA5A5;
    }

    .alert-success {
      background-color: #F0FDF4;
      color: #166534;
      border: 1px solid #BBF7D0;
    }

    .footer-link {
      margin-top: 24px;
      font-size: 0.88rem;
      color: var(--text-muted);
    }

    .footer-link a {
      color: var(--primary-grey);
      font-weight: 700;
      text-decoration: none;
    }

    .footer-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="register-card">
    <a href="index.html" class="brand-logo-container">
      <img src="images/logo.png" alt="Fourways Maths Logo" class="brand-logo-img">
    </a>

    <div class="register-header">
      <h2>Create Student Account</h2>
      <p>Fill in the details below to register for the portal.</p>
    </div>

    <div id="alert-msg" class="alert"></div>

    <form id="register-form">
      <!-- PARENT NAME FIELD -->
      <div class="form-group">
        <label for="parent-name">Parent Name</label>
        <input type="text" id="parent-name" class="form-control" placeholder="e.g. John Smith" required>
      </div>

      <div class="form-group">
        <label for="grade">Learner Grade</label>
        <select id="grade" class="form-control" required>
          <option value="" disabled selected>Select Grade</option>
          <option value="Grade 8">Grade 8</option>
          <option value="Grade 9">Grade 9</option>
          <option value="Grade 10">Grade 10</option>
          <option value="Grade 11">Grade 11</option>
          <option value="Grade 12">Grade 12</option>
        </select>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" class="form-control" placeholder="parent@example.com" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" class="form-control" placeholder="Minimum 6 characters" required minlength="6">
      </div>

      <button type="submit" class="btn-primary" id="btn-submit">Register Account</button>
    </form>

    <div class="footer-link">
      Already registered? <a href="login.html">Sign in here</a>
    </div>
  </div>

  <script>
    // Initialize Supabase Client
    const SUPABASE_URL = "https://iajuctffwesmsumopoqu.supabase.co";
    const SUPABASE_KEY = "sb_publishable_ayM8pw97h1RpKpXcKEtnBA_TBRg2V-1";
    const supabaseClient = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;

    const registerForm = document.getElementById('register-form');
    const alertMsg = document.getElementById('alert-msg');
    const btnSubmit = document.getElementById('btn-submit');

    // Handle Registration Submission
    registerForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      alertMsg.style.display = 'none';

      const parentName = document.getElementById('parent-name').value.trim();
      const grade = document.getElementById('grade').value;
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();

      if (!supabaseClient) {
        showAlert("Database client not connected.", "error");
        return;
      }

      btnSubmit.disabled = true;
      btnSubmit.textContent = "Creating Account...";

      try {
        // Register user and attach parent_name & grade metadata
        const { data, error } = await supabaseClient.auth.signUp({
          email: email,
          password: password,
          options: {
            data: {
              parent_name: parentName,
              full_name: parentName, // Passed for legacy fallback compatibility
              grade: grade
            }
          }
        });

        if (error) throw error;

        showAlert("Account created successfully! Redirecting to login...", "success");
        
        setTimeout(() => {
          window.location.href = "login.html";
        }, 1500);

      } catch (err) {
        showAlert(err.message || "Failed to register account.", "error");
        btnSubmit.disabled = false;
        btnSubmit.textContent = "Register Account";
      }
    });

    function showAlert(msg, type) {
      alertMsg.textContent = msg;
      alertMsg.className = `alert alert-${type}`;
      alertMsg.style.display = 'block';
    }
  </script>
</body>
</html>
