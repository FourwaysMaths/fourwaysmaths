<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fourways Maths | Portal Access</title>
  <!-- Supabase JS CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      /* Sleek Grey & Vibrant Yellow Color Theme */
      --primary-grey: #1E293B;      /* Deep Slate Grey */
      --secondary-grey: #334155;    /* Accent Slate Grey */
      --yellow-accent: #EAB308;    /* Vibrant Yellow/Gold */
      --yellow-hover: #CA8A04;     /* Darker Gold Hover */
      --bg: #F8FAFC;
      --card-bg: #FFFFFF;
      --text-main: #0F172A;
      --text-muted: #64748B;
      --border: #E2E8F0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { 
      background-color: var(--bg); 
      color: var(--text-main); 
      min-height: 100vh; 
      display: flex; 
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 24px 20px;
    }

    /* Container Box */
    .auth-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-top: 6px solid var(--yellow-accent);
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 10px 25px rgba(30, 41, 59, 0.08);
      text-align: center;
    }

    /* Branding / Logo Area */
    .brand-logo-container {
      display: block;
      margin-bottom: 24px;
      text-decoration: none;
    }

    .brand-logo-img {
      height: 95px !important;
      max-height: none !important;
      width: auto;
      object-fit: contain;
      transition: transform 0.2s ease;
    }

    .brand-logo-img:hover {
      transform: scale(1.04);
    }

    .auth-header h2 {
      color: var(--primary-grey);
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .auth-header p {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 24px;
    }

    /* Form Inputs */
    .form-group {
      text-align: left;
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--primary-grey);
      margin-bottom: 6px;
    }

    .form-control {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
      background: #F8FAFC;
      transition: all 0.2s ease;
      outline: none;
    }

    .form-control:focus {
      background: #FFFFFF;
      border-color: var(--yellow-accent);
      box-shadow: 0 0 0 3px rgba(234, 179, 8, 0.2);
    }

    /* Buttons */
    .btn-primary {
      width: 100%;
      background-color: var(--yellow-accent);
      color: var(--primary-grey);
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background-color 0.2s ease;
      margin-top: 8px;
    }

    .btn-primary:hover {
      background-color: var(--yellow-hover);
    }

    /* Alerts */
    .alert {
      padding: 10px;
      border-radius: 6px;
      font-size: 0.85rem;
      margin-bottom: 16px;
      display: none;
      text-align: left;
    }

    .alert-error {
      background-color: #FEF2F2;
      color: #DC2626;
      border: 1px solid #FCA5A5;
    }

    .alert-success {
      background-color: #F0FDF4;
      color: #166534;
      border: 1px solid #BBF7D0;
    }

    /* Footer Switch Link */
    .footer-link {
      margin-top: 24px;
      font-size: 0.88rem;
      color: var(--text-muted);
    }

    .footer-link button {
      background: none;
      border: none;
      color: var(--primary-grey);
      font-weight: 700;
      cursor: pointer;
      font-size: 0.88rem;
      text-decoration: underline;
      padding: 0;
    }

    /* Hidden element helper */
    .register-only {
      display: none;
    }
  </style>
</head>
<body>

  <div class="auth-card">
    <a href="index.html" class="brand-logo-container">
      <img src="images/logo.png" alt="Fourways Maths Logo" class="brand-logo-img">
    </a>

    <div class="auth-header">
      <h2 id="form-title">Student Login</h2>
      <p id="form-subtitle">Welcome back! Enter your details to continue.</p>
    </div>

    <div id="alert-msg" class="alert"></div>

    <form id="auth-form">
      <!-- PARENT NAME (Register Mode Only) -->
      <div class="form-group register-only" id="group-parent-name">
        <label for="parent-name">Parent Name</label>
        <input type="text" id="parent-name" class="form-control" placeholder="e.g. John Smith">
      </div>

      <!-- LEARNER GRADE (Register Mode Only) -->
      <div class="form-group register-only" id="group-grade">
        <label for="grade">Learner Grade</label>
        <select id="grade" class="form-control">
          <option value="" disabled selected>Select Grade</option>
          <option value="Grade 8">Grade 8</option>
          <option value="Grade 9">Grade 9</option>
          <option value="Grade 10">Grade 10</option>
          <option value="Grade 11">Grade 11</option>
          <option value="Grade 12">Grade 12</option>
        </select>
      </div>

      <!-- EMAIL -->
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" class="form-control" placeholder="parent@example.com" required>
      </div>

      <!-- PASSWORD -->
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" class="form-control" placeholder="••••••••" required minlength="6">
      </div>

      <button type="submit" class="btn-primary" id="btn-submit">Sign In</button>
    </form>

    <div class="footer-link">
      <span id="toggle-prompt">Don't have an account?</span>
      <button type="button" id="btn-toggle-mode">Register here</button>
    </div>
  </div>

<script>
  // Initialize Supabase Client
  const SUPABASE_URL = "https://iajuctffwesmsumopoqu.supabase.co";
  const SUPABASE_KEY = "sb_publishable_ayM8pw97h1RpKpXcKEtnBA_TBRg2V-1";
  const supabaseClient = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;

  let isRegisterMode = false;

  const authForm = document.getElementById('auth-form');
  const alertMsg = document.getElementById('alert-msg');
  const btnSubmit = document.getElementById('btn-submit');
  const btnToggleMode = document.getElementById('btn-toggle-mode');
  
  const formTitle = document.getElementById('form-title');
  const formSubtitle = document.getElementById('form-subtitle');
  const togglePrompt = document.getElementById('toggle-prompt');
  
  const registerFields = document.querySelectorAll('.register-only');
  const parentNameInput = document.getElementById('parent-name');
  const gradeInput = document.getElementById('grade');

  // Auto-redirect if already logged in + handle URL URL parameters
  document.addEventListener("DOMContentLoaded", async () => {
    if (supabaseClient) {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (session) {
        window.location.href = "dashboard.html";
        return;
      }
    }

    // Auto-switch to Register mode if URL contains ?mode=register
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('mode') === 'register') {
      btnToggleMode.click();
    }
  });

  // Toggle between Login & Registration view
  btnToggleMode.addEventListener('click', () => {
    isRegisterMode = !isRegisterMode;
    hideAlert();

    if (isRegisterMode) {
      formTitle.textContent = "Create Student Account";
      formSubtitle.textContent = "Fill in the details below to register for the portal.";
      btnSubmit.textContent = "Register Account";
      togglePrompt.textContent = "Already registered?";
      btnToggleMode.textContent = "Sign in here";

      registerFields.forEach(el => el.style.display = 'block');
      parentNameInput.required = true;
      gradeInput.required = true;
    } else {
      formTitle.textContent = "Student Login";
      formSubtitle.textContent = "Welcome back! Enter your details to continue.";
      btnSubmit.textContent = "Sign In";
      togglePrompt.textContent = "Don't have an account?";
      btnToggleMode.textContent = "Register here";

      registerFields.forEach(el => el.style.display = 'none');
      parentNameInput.required = false;
      gradeInput.required = false;
    }
  });

  // Handle Form Submission (Login or Register)
  authForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    hideAlert();

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();

    if (!supabaseClient) {
      showAlert("Database client not connected.", "error");
      return;
    }

    btnSubmit.disabled = true;

    if (isRegisterMode) {
      // --- REGISTRATION LOGIC ---
      btnSubmit.textContent = "Creating Account...";
      const parentName = parentNameInput.value.trim();
      const grade = gradeInput.value;

      if (!grade) {
        showAlert("Please select a grade.", "error");
        btnSubmit.disabled = false;
        btnSubmit.textContent = "Register Account";
        return;
      }

      try {
        const { data, error } = await supabaseClient.auth.signUp({
          email: email,
          password: password,
          options: {
            data: {
              parent_name: parentName,
              full_name: parentName, // Fallback for profile triggers
              grade: grade
            }
          }
        });

        if (error) throw error;

        // If session is returned immediately, redirect; otherwise sign in explicitly
        if (data.session) {
          showAlert("Account created! Redirecting...", "success");
          setTimeout(() => { window.location.href = "dashboard.html"; }, 800);
        } else {
          // Auto sign-in fallback
          const { error: signInErr } = await supabaseClient.auth.signInWithPassword({
            email: email,
            password: password
          });

          if (signInErr) {
            showAlert("Account registered! Please click 'Sign in here' to log in.", "success");
            btnSubmit.disabled = false;
            btnSubmit.textContent = "Register Account";
          } else {
            window.location.href = "dashboard.html";
          }
        }

      } catch (err) {
        showAlert(err.message || "Failed to register account.", "error");
        btnSubmit.disabled = false;
        btnSubmit.textContent = "Register Account";
      }

    } else {
      // --- LOGIN LOGIC ---
      btnSubmit.textContent = "Signing in...";

      try {
        const { data, error } = await supabaseClient.auth.signInWithPassword({
          email: email,
          password: password
        });

        if (error) throw error;

        window.location.href = "dashboard.html";

      } catch (err) {
        showAlert(err.message || "Invalid login credentials.", "error");
        btnSubmit.disabled = false;
        btnSubmit.textContent = "Sign In";
      }
    }
  });

  function showAlert(msg, type = "error") {
    alertMsg.textContent = msg;
    alertMsg.className = `alert alert-${type}`;
    alertMsg.style.display = 'block';
  }

  function hideAlert() {
    alertMsg.style.display = 'none';
  }
</script>
</body>
</html>
