<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fourways Maths Assessment</title>

<style>
body{
    font-family:Arial, sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:40px 20px;
}

.container{
    max-width:800px;
    margin:auto;
    background:white;
    padding:40px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h1{
    color:#0F172A;
}

h2{
    color:#0F172A;
    margin-top:30px;
}

p{
    color:#555;
}

input, select, textarea{
    width:100%;
    padding:12px;
    margin-top:8px;
    margin-bottom:20px;
    border:1px solid #ddd;
    border-radius:6px;
    box-sizing:border-box;
}

.checkbox-group{
    margin-bottom:20px;
}

.checkbox-group label{
    display:block;
    margin:8px 0;
}

button{
    background:#F59E0B;
    color:white;
    border:none;
    padding:15px 25px;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    opacity:0.9;
}
</style>

</head>

<body>

<div class="container">

<h1>Learner Assessment</h1>

<p>
Thank you for your enquiry. Please complete this assessment so that we can recommend the most suitable tutoring support and prepare a personalised quote.
</p>

<form action="https://formspree.io/f/xjgdqgbl" method="POST">
<h2>Parent / Guardian Details</h2>

<label>Parent / Guardian Full Name</label> <input type="text" name="Parent Name" required>

<label>Email Address</label> <input type="email" name="Parent Email" required>

<label>Contact Number</label> <input type="tel" name="Contact Number" required>

<h2>Learner Details</h2>

<label>Learner Full Name</label> <input type="text" name="Learner Name" required>

<label>Grade</label> <select name="Grade" required>

<option value="">Select Grade</option>
<option>Grade 8</option>
<option>Grade 9</option>
<option>Grade 10</option>
<option>Grade 11</option>
<option>Grade 12</option>
</select>

<label>School</label> <input type="text" name="School">

<h2>Subject</h2>

<select name="Subject" required>
<option value="">Select Subject</option>
<option>Mathematics</option>
<option>Mathematical Literacy</option>
</select>

<h2>Current Performance</h2>

<select name="Current Average" required>
<option value="">Select Average</option>
<option>Below 40%</option>
<option>40–59%</option>
<option>60–74%</option>
<option>75%+</option>
</select>

<label>How concerned are you about the learner's performance?</label>

<select name="Concern Level">
<option>Not Concerned</option>
<option>Slightly Concerned</option>
<option>Concerned</option>
<option>Very Concerned</option>
</select>

<h2>Challenges</h2>

<div class="checkbox-group">
<label><input type="checkbox" name="Challenges[]" value="Algebra"> Algebra</label>
<label><input type="checkbox" name="Challenges[]" value="Functions & Graphs"> Functions & Graphs</label>
<label><input type="checkbox" name="Challenges[]" value="Trigonometry"> Trigonometry</label>
<label><input type="checkbox" name="Challenges[]" value="Geometry"> Geometry</label>
<label><input type="checkbox" name="Challenges[]" value="Exam Technique"> Exam Technique</label>
<label><input type="checkbox" name="Challenges[]" value="General Understanding"> General Understanding</label>
<label><input type="checkbox" name="Challenges[]" value="Not Quite Sure"> Not Quite Sure</label>
<label><input type="checkbox" name="Challenges[]" value="Other"> Other(s)</label>
</div>

<h2>Goals</h2>

<div class="checkbox-group">
<label><input type="checkbox" name="Goals[]" value="Catch Up"> Catch Up</label>
<label><input type="checkbox" name="Goals[]" value="Improve Marks"> Improve Marks</label>
<label><input type="checkbox" name="Goals[]" value="Pass Comfortably"> Pass Comfortably</label>
<label><input type="checkbox" name="Goals[]" value="Distinction"> Distinction</label>
<label><input type="checkbox" name="Goals[]" value="Exam Preparation"> Exam Preparation</label>
</div>

<h2>Additional Information</h2>

<textarea
name="Additional Information"
rows="6"
placeholder="Tell us anything else that may help us support the learner..."
></textarea>
<input
type="hidden"
name="_next"
value="https://fourwaysmaths.github.io/fourwaysmaths/success.html">
<button type="submit">
Submit Assessment
</button>

</form>

</div>

</body>
</html>
